/* Container fixo para partÃ­culas */
#tsparticles {

#tsparticles::before,
#tsparticles::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
}

#tsparticles::before {
    background: radial-gradient(circle at 40% 10%, rgba(255,255,255,.08), transparent 25%),
                radial-gradient(circle at 90% 60%, rgba(124,58,237,.12), transparent 18%),
                radial-gradient(circle at 10% 70%, rgba(0,149,246,.1), transparent 18%);

    animation: driftGlow 45s linear infinite;
}

#tsparticles::after {
    background-image: radial-gradient(circle, rgba(255,255,255,.14) 0%, rgba(255,255,255,0) 45%);
    background-position: 20% 20%;
    background-size: 120px 120px;

    50% { transform: translate(20px, -18px) scale(1.03); }

    50% { transform: translate(-10px, 20px) rotate(180deg); }

    border-radius: 8px;
    object-fit: contain; 
    display: block;
}

/* ESTILO PARA CONQUISTAS DESBLOQUEADAS */
.achievement-unlocked {
    opacity: 1 !important;
    border-color: var(--theme-color) !important;
    box-shadow: 0 0 20px rgba(var(--theme-rgb), 0.2);
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

#portal-overlay {
    position: fixed;
    inset: 0;
    z-index: 1100;
    display: none;
    align-items: center;
    justify-content: center;
    pointer-events: none;
}

#portal-overlay.active {
    display: flex;
}

.portal-core {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,.6), rgba(0,149,246,.12) 35%, rgba(124,58,237,0) 70%);
    box-shadow: 0 0 140px rgba(0,149,246,.4), inset 0 0 45px rgba(255,255,255,.45);
    animation: portalOpen 0.9s ease forwards;
}

#star-explosion,
#admin-wave,
#disconnect-fade {
    position: fixed;
    inset: 0;
    z-index: 1110;
    pointer-events: none;
    display: none;
    align-items: center;
    justify-content: center;
}

#star-explosion.active,
#admin-wave.active,
#disconnect-fade.active {
    display: flex;
}

#star-explosion span {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,1), rgba(68,197,255,0));
    box-shadow: 0 0 18px rgba(255,255,255,.9);
    animation: starBurst 1s ease-out forwards;
}

@keyframes starBurst {
    from { opacity: 1; transform: translate(0, 0) scale(0.3); }
    to { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(1.4); }
}

#admin-wave .wave-ring {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    border: 3px solid rgba(0,255,255,.4);
    box-shadow: 0 0 40px rgba(0,255,255,.35), inset 0 0 30px rgba(0,255,255,.25);
    animation: adminWave 1s ease-out forwards;
}

@keyframes adminWave {
    0% { transform: scale(0.5); opacity: 0.8; }
    50% { transform: scale(1.3); opacity: 0.5; }
    100% { transform: scale(2.4); opacity: 0; }
}

#disconnect-fade {
    background: rgba(255,255,255,0.04);
}

#disconnect-fade.active {
    animation: disconnectFade 1s ease-out forwards;
}

@keyframes disconnectFade {
    0% { opacity: 0; backdrop-filter: blur(0px); }
    40% { opacity: 0.5; backdrop-filter: blur(4px); }
    100% { opacity: 0; backdrop-filter: blur(16px); }
}

@keyframes portalOpen {
    0% { transform: scale(0.3) rotate(0deg); opacity: 0; }
    50% { transform: scale(1.15) rotate(90deg); opacity: 1; }
    100% { transform: scale(1) rotate(180deg); opacity: 0; }
}

/* MENSAGENS TEMPORÃRIAS */
.temp-message {
    animation: fadeOut 30s ease-out forwards;
    background: linear-gradient(135deg, rgba(255,165,0,0.1), rgba(255,69,0,0.1));
    border: 1px solid rgba(255,165,0,0.3);
}

@keyframes fadeOut {
    0% { opacity: 1; transform: scale(1); }
    90% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0.95); }
}
