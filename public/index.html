<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>chat</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tsparticles-confetti@2.12.0/tsparticles.confetti.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>

<style>
/* Adicionado JetBrains Mono para Hierarquia Tipográfica de Sistema */
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');

:root{
--theme-color:#0095f6;
--theme-rgb:0,149,246;
--creator-gold:#ffec82;
--creator-gold-dark:#daa520;
--adm-red:#ff3040;
}

/* --- ATUALIZAÇÃO: ANIMAÇÃO DE FUNDO --- */
@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

@keyframes floatNebula {
    0% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-30px, 40px) scale(1.1); }
    100% { transform: translate(0, 0) scale(1); }
}

body{
font-family:'Plus Jakarta Sans',sans-serif;
/* Ajustado para fundo transparente para as partículas aparecerem */
background: transparent;
color:#fff;
margin:0;
padding:0;
height:100vh;
display:flex;
overflow:hidden;
position:relative;
}

/* Container fixo para partículas */
#tsparticles {
    position: fixed;
    inset: 0;
    z-index: -1;
    background: radial-gradient(circle at 15% 20%, rgba(0,149,246,.18), transparent 15%),
                radial-gradient(circle at 80% 10%, rgba(124,58,237,.16), transparent 14%),
                radial-gradient(circle at 35% 85%, rgba(255,255,255,.08), transparent 15%),
                #050508;
    pointer-events: none; /* Correção para não atrapalhar o clique */
    overflow: hidden;
}

#tsparticles::before,
#tsparticles::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
}

#tsparticles::before {
    background: radial-gradient(circle at 40% 10%, rgba(255,255,255,.08), transparent 25%),
                radial-gradient(circle at 90% 60%, rgba(124,58,237,.12), transparent 18%),
                radial-gradient(circle at 10% 70%, rgba(0,149,246,.1), transparent 18%);
    filter: blur(30px);
    animation: driftGlow 45s linear infinite;
}

#tsparticles::after {
    background-image: radial-gradient(circle, rgba(255,255,255,.14) 0%, rgba(255,255,255,0) 45%);
    background-position: 20% 20%;
    background-size: 120px 120px;
    opacity: 0.45;
    animation: driftSparkles 28s linear infinite;
}

@keyframes driftGlow {
    0% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(20px, -18px) scale(1.03); }
    100% { transform: translate(0, 0) scale(1); }
}

@keyframes driftSparkles {
    0% { transform: translate(0, 0) rotate(0deg); }
    50% { transform: translate(-10px, 20px) rotate(180deg); }
    100% { transform: translate(0, 0) rotate(360deg); }
}

/* Camada escura ajustada para partículas brilharem mais */
body::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.4);
    z-index: 1;
    pointer-events: none;
}

.nebula {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.12;
    z-index: 0;
    animation: floatNebula 25s infinite ease-in-out;
}
/* ------------------------------------- */

/* ATUALIZAÇÃO: Fonte JetBrains para mensagens de sistema */
.system-msg{
width:100%;
text-align:center;
font-family: 'JetBrains Mono', monospace;
font-size:10px;
color:rgba(255,255,255,.3);
margin:10px 0;
text-transform: uppercase;
letter-spacing: 1px;
white-space: pre-wrap;
word-break: break-word;
}

/* NOVO: Efeito Pulsante Vermelho para Admins Ativos */
.avatar-active {
    border: 2px solid var(--adm-red) !important;
    box-shadow: 0 0 0 0 rgba(255, 48, 64, 0.7);
    animation: pulse-red 1.5s infinite cubic-bezier(0.66, 0, 0, 1);
}
@keyframes pulse-red {
    to { box-shadow: 0 0 0 12px rgba(255, 48, 64, 0); }
}

/* NOVO: Overlay do Comando /shout */
#shout-overlay {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.95);
    backdrop-filter: blur(20px);
    text-align: center;
}
.text-shout {
    font-size: 5rem;
    font-weight: 900;
    text-transform: uppercase;
    line-height: 0.9;
    letter-spacing: -3px;
    font-style: italic;
    background: linear-gradient(to bottom, #fff, #666);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.admin-glow{
border:1px solid rgba(255,236,130,.3)!important;
box-shadow:0 0 15px rgba(255,236,130,.1),0 15px 50px -10px rgba(0,0,0,.6)!important;
}

/* ATUALIZADO: Micro-interação de surgimento de mensagens */
@keyframes slideIn{
from{opacity:0;transform:scale(0.8) translateY(20px);}
to{opacity:1;transform:scale(1) translateY(0);}
}

.message-animate{
animation:slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}

.msg-header-autoridade{
display:flex;
align-items:center;
gap:6px;
margin-bottom:5px;
}

.badge-authority{
font-size:8px;
font-weight:800;
padding:2px 7px;
border-radius:4px;
text-transform:uppercase;
display:inline-flex;
align-items:center;
letter-spacing:.5px;
}

.admin-icon{
color:var(--adm-red);
font-size:12px;
filter:drop-shadow(0 0 4px var(--adm-red));
}

.badge-adm{
background:#000;
color:var(--adm-red)!important;
border:1px solid var(--adm-red);
box-shadow:0 0 8px rgba(255,48,64,.4);
}

.user-label {
    text-shadow: 0 0 12px rgba(0,255,255,.18), 0 0 28px rgba(124,58,237,.15);
    letter-spacing: 0.5px;
}

.admin-name-highlight{
color:var(--creator-gold)!important;
text-shadow:0 0 10px rgba(255,236,130,.3);
font-weight:800;
}

.bubble-me{
background: linear-gradient(135deg, rgba(var(--theme-rgb),.25), rgba(var(--theme-rgb),.1)) !important;
backdrop-filter:blur(13px);
border:1px solid rgba(255,255,255,.1)!important;
box-shadow:0 15px 50px -10px rgba(0,0,0,.6);
transition: transform .25s ease, box-shadow .25s ease;
position: relative;
}

.bubble-me::before,
.bg-white\/5::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    opacity: 0;
    transition: opacity .25s ease, transform .25s ease;
    pointer-events: none;
    background: radial-gradient(circle at 20% 20%, rgba(0,255,255,.18), transparent 30%),
                radial-gradient(circle at 80% 80%, rgba(149,0,246,.14), transparent 35%);
    mix-blend-mode: screen;
}

.bubble-me:hover,
.bg-white\/5:hover {
    transform: translateY(-1px) scale(1.01);
    box-shadow: 0 0 35px rgba(0,149,246,.18), 0 0 60px rgba(124,58,237,.12), 0 18px 40px rgba(0,0,0,.28);
}

.bubble-me:hover::before,
.bg-white\/5:hover::before {
    opacity: 1;
    transform: scale(1.04);
}

.bg-white\/5{
background: linear-gradient(135deg, rgba(255,255,255,.08), rgba(255,255,255,.02)) !important;
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.05)!important;
box-shadow:0 15px 50px -10px rgba(0,0,0,.6);
transition: transform .25s ease, box-shadow .25s ease;
position: relative;
}

.glow-bg{
position:absolute;
width:600px;
height:600px;
border-radius:50%;
filter:blur(100px);
opacity:.4;
z-index:0;
pointer-events:none;
}

.glow-1{
background:var(--theme-color);
top:-15%;
left:-10%;
}

.glow-2{
background:#7c3aed;
bottom:-15%;
right:-10%;
}

.glass-panel{
background:rgba(255,255,255,.03);
backdrop-filter:blur(20px);
border-right:1px solid rgba(255,255,255,.05);
position:relative;
z-index:10;
}

.avatar-main{
width:85px;
height:85px;
border-radius:50%;
object-fit:cover;
border:3px solid var(--theme-color);
position: relative;
}

.avatar-badge {
position: absolute;
bottom: -2px;
right: -2px;
width: 24px;
height: 24px;
background: var(--adm-red);
border: 2px solid #050505;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-size: 12px;
font-weight: bold;
}

.msg-timestamp {
font-size: 9px;
color: rgba(255,255,255,.4);
margin-top: 4px;
}

.msg-actions {
display: flex;
gap: 6px;
margin-top: 6px;
opacity: 0;
transition: opacity 0.2s;
}

.msg-actions button {
font-size: 9px;
padding: 2px 6px;
background: rgba(255,255,255,.1);
border: none;
border-radius: 4px;
color: white;
cursor: pointer;
transition: background 0.2s;
}

.msg-actions button:hover {
background: rgba(255,255,255,.2);
}

.room-color-geral { --room-color: #0095f6; }
.room-color-Desenvolvedores { --room-color: #ff3040; }
.room-color-random { --room-color: #00f9f9; }

#search-input {
font-size: 12px;
}

.search-highlight {
background: rgba(255, 200, 0, 0.3) !important;
}

.lv-badge-circle{
position:absolute;
bottom:0;
right:0;
background:var(--theme-color);
color:#fff;
font-size:10px;
font-weight:900;
width:24px;
height:24px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
border:3px solid #050505;
}

.xp-bar-bg{
width:100%;
height:5px;
background:rgba(255,255,255,.1);
border-radius:10px;
overflow:hidden;
position:relative;
}

.xp-bar-fill{
height:100%;
background:linear-gradient(90deg,var(--theme-color),#fff);
transition:width .5s ease;
}

.insta-input-container{
background:rgba(255,255,255,.07);
border:1px solid rgba(255,255,255,.1);
border-radius:30px;
transition:.3s;
box-shadow:0 4px 15px rgba(0,0,0,.2);
}

.insta-input-container:focus-within{
background:rgba(255,255,255,.1);
border-color:var(--theme-color);
transform:translateY(-2px);
}

#messages::-webkit-scrollbar, #gartic-chat-messages::-webkit-scrollbar{width:4px;}
#messages::-webkit-scrollbar-thumb, #gartic-chat-messages::-webkit-scrollbar-thumb{
background:rgba(255,255,255,.1);
border-radius:10px;
}

.theme-dot{
width:28px;
height:28px;
border-radius:50%;
cursor:pointer;
border:2px solid rgba(255,255,255,.1);
}

#typing-indicator{
transition:opacity .3s;
min-height:20px;
font-size:10px;
color:#666;
padding-left:20px;
}

.xp-popup{
position:absolute;
color:var(--theme-color);
font-weight:bold;
font-size:12px;
right:0;
top:-20px;
animation:floatUp 1s ease-out forwards;
pointer-events:none;
}

@keyframes floatUp{
0%{opacity:1;transform:translateY(0);}
100%{opacity:0;transform:translateY(-20px);}
}

.gartic-select {
background: rgba(255, 255, 255, 0.1);
color: white;
border: 1px solid rgba(255, 255, 255, 0.1);
border-radius: 12px;
padding: 5px 10px;
outline: none;
cursor: pointer;
font-size: 12px;
}
.gartic-select option {
background: #111;
color: white;
}

/* NOVO: Estilos do Menu de Menções e Emojis */
.mention-item.active, .emoji-item.active {
    background: var(--theme-color);
    color: white;
}

/* --- ATUALIZAÇÃO: CORREÇÃO HOVER CARD --- */
#hover-card {
    position: fixed;
    z-index: 2000; /* Aumentado para garantir visibilidade */
    pointer-events: none;
    display: none;
    width: 256px; /* Largura fixa */
    background: #0a0a0a;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
    overflow: hidden;
    transition: opacity 0.15s ease;
}

#hover-banner {
    height: 64px;
    background: linear-gradient(to right, var(--theme-color), #7c3aed);
}

#hover-card-content {
    position: relative;
    padding: 0 16px 16px 16px;
    margin-top: -35px; /* Sobe o avatar sobre o banner */
    display: flex;
    flex-direction: column;
    align-items: center;
}

#hover-avatar {
    width: 75px;
    height: 75px;
    border-radius: 50%;
    border: 4px solid #0a0a0a;
    object-fit: cover;
    background: #111;
}

/* --- NOVO: ESTILO MEDALHAS NO CARD --- */
.medal-slot {
    width: 22px;
    height: 22px;
    background: rgba(255,255,255,0.05);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    border: 1px solid rgba(255,255,255,0.1);
}

/* --- NOVO: MODO CINEMA GARTIC --- */
.gartic-cinema-mode {
    position: fixed !important;
    inset: 0 !important;
    z-index: 500 !important;
    background: rgba(0,0,0,0.95) !important;
    backdrop-filter: blur(20px);
    display: flex !important;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.gartic-cinema-mode .max-w-6xl { max-width: 95% !important; width: 100%; }

/* ------------------------------------- */

/* NOVO: Estilo Sala Ativa */
.room-btn.active {
    background: rgba(var(--theme-rgb), 0.15);
    border-left: 3px solid var(--theme-color);
    color: white;
}

/* Limita o tamanho de qualquer imagem dentro das bolhas de mensagem */
.bubble-me img, 
.bg-white\/5 img {
    max-width: 250px !important;
    max-height: 250px !important;
    border-radius: 8px;
    object-fit: contain; 
    display: block;
}

/* ESTILO PARA CONQUISTAS DESBLOQUEADAS */
.achievement-unlocked {
    opacity: 1 !important;
    border-color: var(--theme-color) !important;
    box-shadow: 0 0 20px rgba(var(--theme-rgb), 0.2);
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

#portal-overlay {
    position: fixed;
    inset: 0;
    z-index: 1100;
    display: none;
    align-items: center;
    justify-content: center;
    pointer-events: none;
}

#portal-overlay.active {
    display: flex;
}

.portal-core {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,.6), rgba(0,149,246,.12) 35%, rgba(124,58,237,0) 70%);
    box-shadow: 0 0 140px rgba(0,149,246,.4), inset 0 0 45px rgba(255,255,255,.45);
    animation: portalOpen 0.9s ease forwards;
}

@keyframes portalOpen {
    0% { transform: scale(0.3) rotate(0deg); opacity: 0; }
    50% { transform: scale(1.15) rotate(90deg); opacity: 1; }
    100% { transform: scale(1) rotate(180deg); opacity: 0; }
}

/* MENSAGENS TEMPORÁRIAS */
.temp-message {
    animation: fadeOut 30s ease-out forwards;
    background: linear-gradient(135deg, rgba(255,165,0,0.1), rgba(255,69,0,0.1));
    border: 1px solid rgba(255,165,0,0.3);
}

@keyframes fadeOut {
    0% { opacity: 1; transform: scale(1); }
    90% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0.95); }
}

</style>
</head>

<body>

<div id="tsparticles"></div>

<div class="nebula" style="background:var(--theme-color); top:-10%; left:15%;"></div>
<div class="nebula" style="background:#7c3aed; bottom:5%; right:5%; animation-delay: -5s;"></div>

<div id="hover-card">
    <div id="hover-banner"></div>
    <div id="hover-card-content">
        <img id="hover-avatar" src="" alt="">
        <h3 id="hover-name" class="font-bold text-white text-lg mt-2"></h3>
        <p id="hover-title" class="text-[9px] font-black uppercase tracking-widest text-blue-400 mb-2"></p>
        <p id="hover-status" class="text-[10px] text-green-400 mb-2">● Online</p>
        <p id="hover-last-seen" class="text-[9px] text-gray-400 mb-2"></p>
        
        <div id="hover-medals" class="flex gap-1.5 mb-3">
            <div class="medal-slot" id="medal-tagarela" title="Tagarela">💬</div>
            <div class="medal-slot" id="medal-pintor" title="Pintor">🎨</div>
            <div class="medal-slot" id="medal-antigo" title="Antigo">⏳</div>
        </div>

        <div class="w-full bg-white/5 rounded-xl p-3 border border-white/5">
            <div class="flex justify-between text-[10px] mb-1 font-black">
                <span class="text-gray-400 uppercase">Nível Atual</span>
                <span id="hover-level" class="text-white"></span>
            </div>
            <div class="w-full h-1.5 bg-black rounded-full overflow-hidden">
                <div id="hover-xp-bar" class="h-full bg-blue-500 transition-all duration-500"></div>
            </div>
        </div>
    </div>
</div>

<div id="shout-overlay">
    <div class="p-10">
        <p id="shout-author" class="text-xs font-bold text-red-500 tracking-[0.3em] mb-4 uppercase"></p>
        <h1 id="shout-text" class="text-shout"></h1>
    </div>
</div>

<div id="portal-overlay" class="hidden">
    <div class="portal-core"></div>
</div>

<div class="glow-bg glow-1"></div>
<div class="glow-bg glow-2"></div>

<div id="login" class="fixed inset-0 bg-black z-[100] flex items-center justify-center p-6">
<div class="w-full max-w-sm text-center">
<h1 class="text-5xl font-extrabold tracking-tighter bg-gradient-to-r from-blue-500 to-purple-600 bg-clip-text text-transparent mb-10">Lux.</h1>

<input id="username" type="text" placeholder="Nome de usuário" class="w-full bg-[#121212] border border-[#333] p-4 rounded-2xl mb-4 outline-none text-white text-center">

<input id="avatar" type="text" placeholder="URL da foto (opcional)" class="w-full bg-[#121212] border border-[#333] p-4 rounded-2xl mb-4 outline-none text-white text-center">

<button onclick="entrar()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-500 transition">
Entrar
</button>
</div>
</div>

<aside class="w-20 lg:w-72 glass-panel hidden md:flex flex-col p-4 flex-shrink-0">

<div class="profile-section flex flex-col items-center gap-4 py-4">
<div class="avatar-wrapper relative">
<img id="my-avatar" src="" class="avatar-main">
<div id="user-level" class="lv-badge-circle">1</div>
</div>

<div class="text-center">
  <h3 id="my-name" class="font-bold text-sm tracking-tight text-white"></h3>
  <p id="my-bio" class="text-[10px] text-gray-400 italic mt-1 max-w-[200px]"></p>
</div>

<div class="w-full px-4">
<div class="flex justify-between text-[9px] font-bold text-gray-500 mb-1">
<span>XP STATUS</span>
<span><span id="user-xp">0</span>/100</span>
</div>

<div class="xp-bar-bg">
<div id="xp-fill" class="xp-bar-fill"></div>
<div id="xp-popup-container"></div>
</div>
</div>
</div>

<div class="mt-4 px-2">
    <p class="text-[10px] font-black text-gray-500 uppercase tracking-tighter mb-2">Canais</p>
    <div class="space-y-1">
        <button onclick="changeRoom('Geral')" class="room-btn active w-full text-left text-sm p-2.5 rounded-xl hover:bg-white/5 transition flex items-center gap-2">
            <span class="text-lg">💬</span> Geral
        </button>
    </div>
</div>

<div id="user-list" class="flex-1 overflow-y-auto space-y-2 mt-4 border-t border-white/5 pt-4"></div>

<div class="pt-4 border-t border-white/5 space-y-2">
<button onclick="toggleGarticView()" class="w-full text-left text-blue-400 text-sm p-2 hover:bg-blue-500/10 rounded-lg transition font-bold">
🎨 Abrir Painel Gartic
</button>

<button onclick="openSettings()" class="w-full text-left text-gray-400 text-sm p-2 hover:text-white transition">
⚙️ Configurações
</button>

<button onclick="viewLogs()" class="w-full text-left text-red-400 text-sm p-2 hover:text-red-300 transition" id="logs-btn" style="display:none;">
📋 Ver Logs
</button>

<button onclick="logout()" class="w-full text-left text-red-500 text-sm p-2 font-bold hover:bg-red-500/10 rounded-lg transition">
Sair
</button>
</div>

</aside>

<main class="flex-1 flex flex-col bg-transparent overflow-hidden relative z-10">

<header class="h-16 border-b border-white/5 flex items-center px-6 backdrop-blur-md flex-shrink-0 justify-between">
<h2 class="font-bold text-white flex items-center gap-2">
<span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
<span id="room-title">Canal Principal</span>
</h2>
</header>

<div id="pin-banner" class="hidden bg-blue-500/10 border-b border-blue-500/30 p-2 px-6 flex justify-between items-center backdrop-blur-xl">
    <div class="flex items-center gap-3 overflow-hidden">
        <span class="text-blue-400 text-xs">📌</span>
        <p id="pin-text" class="text-xs text-white/80 truncate italic"></p>
    </div>
    <button onclick="document.getElementById('pin-banner').classList.add('hidden')" class="text-gray-500 hover:text-white text-xs">✕</button>
</div>

<div id="pinned-messages" class="px-6 py-2 border-b border-yellow-500/20 bg-yellow-500/5"></div>

<div class="flex items-center px-6 py-2 border-b border-white/10">

<script src="script.js"></script>

<script>
/* --- CONFIGURAÇÃO OTIMIZADA DAS PARTÍCULAS (PARA PARAR DE TRAVAR) --- */
tsParticles.load("tsparticles", {
    fpsLimit: 60, // Limita o FPS para não sobrecarregar
    fullScreen: { enable: true },
    particles: {
        number: { 
            value: 60, // Quantidade ideal para não travar
            density: { enable: true, area: 800 } 
        },
        color: { value: ["#0095f6", "#00f9f9", "#9000ff"] },
        shape: { type: ["circle", "triangle"] },
        opacity: {
            value: 0.6,
            animation: { enable: true, speed: 1, minimumValue: 0.1 }
        },
        size: {
            value: { min: 1, max: 4 },
            animation: { enable: true, speed: 2, minimumValue: 1 }
        },
        links: {
            enable: true,
            distance: 140,
            color: "#0095f6",
            opacity: 0.4,
            width: 1
        },
        move: {
            enable: true,
            speed: 1.5, // Velocidade suave
            direction: "none",
            outModes: "out"
        }
    },
    interactivity: {
        events: {
            onHover: { enable: true, mode: "grab" },
            resize: true
        },
        modes: {
            grab: { distance: 180, links: { opacity: 0.6 } }
        }
    },
    detectRetina: false // Desligado para economizar processamento em telas 4K/Mobile
});

/* --- LÓGICA DO HOVER CARD (ANTI-CORTE E NÍVEL ATUAL) --- */
document.addEventListener('mousemove', (e) => {
    const card = document.getElementById('hover-card');
    if (card.style.display === 'block') {
        let x = e.clientX + 15;
        let y = e.clientY + 15;

        // Evita que o card saia pela direita da tela
        if (x + 260 > window.innerWidth) {
            x = e.clientX - 275;
        }
        // Evita que o card saia pela parte de baixo da tela
        if (y + 220 > window.innerHeight) {
            y = e.clientY - 230;
        }

        card.style.left = x + 'px';
        card.style.top = y + 'px';
    }
});

// Essa função deve ser usada dentro do seu script.js para preencher os dados
function showUserCard(user) {
    const card = document.getElementById('hover-card');
    document.getElementById('hover-name').innerText = user.name;
    document.getElementById('hover-avatar').src = user.avatar || 'https://via.placeholder.com/150';
    
    // CORREÇÃO: Pegando o nível correto e atualizado
    document.getElementById('hover-level').innerText = user.level || '1';
    
    document.getElementById('hover-title').innerText = user.level > 10 ? 'Veterano Lux' : 'Membro';
    
    // Barra de XP no Card
    const xpPercent = (user.xp % 100); 
    document.getElementById('hover-xp-bar').style.width = xpPercent + '%';

    // Ilumina medalhas se o usuário tiver as conquistas (lógica vinculada ao script.js)
    if(user.stats){
        document.getElementById('medal-tagarela').style.opacity = user.stats.messagesSent >= 1000 ? '1' : '0.2';
        document.getElementById('medal-pintor').style.opacity = user.stats.garticWins >= 10 ? '1' : '0.2';
    }

    card.style.display = 'block';
    card.style.opacity = '1';
}

function hideUserCard() {
    const card = document.getElementById('hover-card');
    card.style.display = 'none';
    card.style.opacity = '0';
}

/* --- FUNÇÕES NOVAS PARA MODO CINEMA E CONQUISTAS --- */
function toggleCinemaMode() {
    const box = document.getElementById('gartic-box');
    box.classList.toggle('gartic-cinema-mode');
}

function openAchievements() {
    document.getElementById('achievements-modal').classList.remove('hidden');
}
</script>
