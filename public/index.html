<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root { --theme-color: #0095f6; } /* Azul Instagram padrão */

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000000; /* Fundo totalmente preto estilo OLED */
            color: #f5f5f5;
        }

        /* Efeito de Vidro Escuro */
        .glass-ui { 
            background: #121212; 
            border: 1px solid #262626; 
        }

        /* Estilo das Bolhas */
        .bubble-me {
            background: linear-gradient(45deg, #373737, #262626);
            border: 1px solid #333;
        }
        
        .bubble-other {
            background: #121212;
            border: 1px solid #262626;
        }

        /* Scrollbar Invisível/Moderna */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .bg-theme { background-color: var(--theme-color) !important; }
        .text-theme { color: var(--theme-color) !important; }
        .border-theme { border-color: var(--theme-color) !important; }

        .insta-input {
            background: #121212;
            border: 1px solid #363636;
            border-radius: 22px;
        }
    </style>
</head>
<body class="h-screen flex overflow-hidden" id="theme-style-container">

    <div id="login" class="fixed inset-0 bg-black z-[100] flex items-center justify-center p-6">
        <div class="w-full max-w-sm text-center">
            <h1 class="text-4xl font-bold mb-10 tracking-tighter italic">ChatApp</h1>
            <div class="space-y-4">
                <input id="username" type="text" placeholder="Nome de usuário" class="w-full bg-[#121212] border border-[#262626] p-4 rounded-lg outline-none focus:border-gray-500 text-sm">
                <input id="avatar" type="text" placeholder="Link da foto (URL)" class="w-full bg-[#121212] border border-[#262626] p-4 rounded-lg outline-none focus:border-gray-500 text-sm">
                <button onclick="entrar()" class="w-full bg-theme text-white font-bold py-3 rounded-lg text-sm mt-4 active:opacity-70 transition">Entrar</button>
            </div>
        </div>
    </div>

    <aside class="w-20 md:w-80 border-r border-[#262626] flex flex-col p-4 hidden md:flex">
        <div class="p-4 mb-8">
            <h1 class="text-2xl font-bold tracking-tighter">Mensagens</h1>
        </div>
        
        <div class="px-4 mb-4 flex justify-between items-center text-sm font-bold">
            <span>Online</span>
            <span id="user-count" class="text-gray-500">0</span>
        </div>

        <div id="user-list" class="flex flex-col gap-2 overflow-y-auto px-2"></div>
        
        <div class="mt-auto border-t border-[#262626] pt-4 flex flex-col gap-4 px-4">
            <button onclick="openSettings()" class="flex items-center gap-3 text-sm font-medium hover:text-gray-400 transition">
                <span>⚙️ Configurações</span>
            </button>
            <button onclick="logout()" class="text-xs text-red-500 font-bold hover:underline transition text-left">Sair</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative bg-black">
        <header class="h-16 border-b border-[#262626] flex items-center px-6 justify-between bg-black/80 backdrop-blur-md sticky top-0 z-10">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span class="font-bold text-sm tracking-tight">Canal Geral</span>
            </div>
            <div id="typing-indicator" class="text-[10px] text-gray-500 italic"></div>
        </header>

        <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-6 flex flex-col"></div>

        <div id="reply-container" class="hidden bg-[#121212] border-t border-[#262626] p-3 flex justify-between items-center animate-slide-up">
            <div class="text-xs border-l-2 border-theme pl-3">
                <p class="text-gray-500 font-medium">Respondendo a <span id="reply-name" class="text-white font-bold"></span></p>
                <p id="reply-text" class="text-gray-400 truncate w-64"></p>
            </div>
            <button onclick="cancelReply()" class="text-gray-500 text-lg pr-2">✕</button>
        </div>

        <footer class="p-4 bg-black">
            <div class="max-w-4xl mx-auto relative flex items-center gap-3">
                <button type="button" onclick="enviarFoto()" class="text-2xl hover:scale-110 transition">🖼️</button>
                <form id="form" class="flex-1 flex items-center insta-input px-4 py-1">
                    <input id="input" autocomplete="off" placeholder="Enviar mensagem..." class="flex-1 bg-transparent py-3 outline-none text-sm">
                    <button class="text-theme font-bold text-sm ml-2 hover:text-white transition">Enviar</button>
                </form>
            </div>
        </footer>
    </main>

    <div id="settings-modal" class="hidden fixed inset-0 bg-black/90 z-[200] flex items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-[#262626] p-8 rounded-2xl w-full max-w-xs shadow-2xl">
            <h2 class="text-lg font-bold mb-6 text-center">Configurações</h2>
            
            <div class="space-y-4 text-sm">
                <div>
                    <label class="text-gray-500 text-[10px] uppercase font-bold">Nome</label>
                    <input id="set-username" type="text" class="w-full bg-[#121212] border border-[#363636] p-3 rounded-lg mt-1 outline-none">
                </div>
                <div>
                    <label class="text-gray-500 text-[10px] uppercase font-bold">Foto URL</label>
                    <input id="set-avatar" type="text" class="w-full bg-[#121212] border border-[#363636] p-3 rounded-lg mt-1 outline-none">
                </div>
                <div>
                    <label class="text-gray-500 text-[10px] uppercase font-bold">Cor do Destaque</label>
                    <div class="flex gap-3 mt-2">
                        <button onclick="changeTheme('blue', '#0095f6')" class="w-6 h-6 rounded-full bg-[#0095f6]"></button>
                        <button onclick="changeTheme('purple', '#a855f7')" class="w-6 h-6 rounded-full bg-[#a855f7]"></button>
                        <button onclick="changeTheme('red', '#ff3040')" class="w-6 h-6 rounded-full bg-[#ff3040]"></button>
                        <button onclick="changeTheme('gold', '#ffca28')" class="w-6 h-6 rounded-full bg-[#ffca28]"></button>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-2 mt-10">
                <button onclick="saveSettings()" class="w-full bg-theme py-3 rounded-lg font-bold text-sm text-white">Salvar</button>
                <button onclick="closeSettings()" class="w-full text-white text-sm py-2">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
