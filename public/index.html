<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lux Chat Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        :root { --theme-color: #0095f6; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; color: #fff; overflow: hidden; }

        /* --- MELHORIA SIDEBAR (2) --- */
        .glass-sidebar { 
            background: rgba(10, 10, 10, 0.6); 
            backdrop-filter: blur(20px); 
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }
        .user-item {
            transition: all 0.2s ease;
            border-radius: 12px;
        }
        .user-item:hover {
            background: rgba(255, 255, 255, 0.03);
            transform: translateX(2px);
        }

        /* --- ESTILOS GERAIS MANTIDOS --- */
        .insta-input-container { background: #1a1a1a; border: 1px solid #333; border-radius: 30px; }
        .insta-input-container:focus-within { border-color: var(--theme-color); box-shadow: 0 0 15px rgba(0, 149, 246, 0.1); }
        
        /* O Glow agora é controlado pelo JS (Refinamento 1) */
        .bubble-glow { box-shadow: 0 4px 20px -5px var(--theme-color); }

        .adm-name {
            background: linear-gradient(to right, #ffd700, #fff, #ffd700);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 2s linear infinite;
            font-weight: 800 !important;
        }
        .badge-criador {
            background: linear-gradient(45deg, #ffd700, #ff8c00);
            color: #000 !important;
            font-size: 9px !important;
            font-weight: 900;
            padding: 2px 6px;
            border-radius: 6px;
            margin-left: 8px;
            text-transform: uppercase;
        }
        .adm-bubble { border: 1px solid rgba(255, 215, 0, 0.3) !important; }
        
        @keyframes shine { to { background-position: 200% center; } }

        /* --- EFEITOS VISUAIS (4) - Animação de Entrada --- */
        @keyframes messageIn {
            from { opacity: 0; transform: translateY(15px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .message-animation {
            animation: messageIn 0.3s ease-out forwards;
        }

        /* --- OUTROS ESTILOS MANTIDOS --- */
        .theme-dot { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 3px solid rgba(255,255,255,0.1); transition: 0.2s; }
        .theme-dot:hover { transform: scale(1.15); border-color: white; }
        .theme-dot.active { border-color: white; box-shadow: 0 0 10px var(--theme-color); }
        .system-msg { font-size: 11px; color: #555; text-align: center; margin: 10px 0; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .mention-me { background-color: rgba(255, 215, 0, 0.1) !important; border: 1px solid #ffd700 !important; }
        .mention-text { color: var(--theme-color); font-weight: bold; }
        .letreiro-msg { background: #fff; color: #000; font-weight: 900; padding: 10px 20px; border-radius: 10px; text-transform: uppercase; letter-spacing: 4px; animation: pulse-red 1s infinite; text-align: center; width: 100%; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.7); } 70% { box-shadow: 0 0 0 15px rgba(255,255,255,0); } 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); } }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flexoverflow-hidden">
    <div id="login" class="fixed inset-0 bg-black z-[100] flex items-center justify-center p-6">
        <div class="w-full max-w-sm text-center">
            <h1 class="text-5xl font-extrabold tracking-tighter bg-gradient-to-r from-blue-500 to-purple-600 bg-clip-text text-transparent mb-10">Lux.</h1>
            <div class="space-y-4 text-left">
                <input id="username" type="text" placeholder="Nome de usuário" class="w-full bg-[#121212] border border-[#333] p-4 rounded-2xl outline-none text-white focus:border-blue-500 transition">
                <input id="avatar" type="text" placeholder="Link da foto" class="w-full bg-[#121212] border border-[#333] p-4 rounded-2xl outline-none text-white focus:border-blue-500 transition">
                <button onclick="entrar()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-500 transition">Entrar</button>
            </div>
        </div>
    </div>

    <aside class="w-20 lg:w-80 glass-sidebar hidden md:flex flex-col p-6">
        <h1 class="text-2xl font-bold mb-10 px-2 tracking-tighter">Mensagens</h1>
        <div class="flex-1 overflow-y-auto space-y-1" id="user-list"></div>
        <div class="mt-auto pt-6 border-t border-[#222]">
            <button onclick="openSettings()" class="flex items-center gap-3 w-full p-3 hover:bg-white/5 rounded-xl transition font-medium text-sm text-gray-400">⚙️ Configurações</button>
            <button onclick="logout()" class="text-red-500 text-sm font-bold p-3 hover:underline">Sair</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col bg-black">
        <header class="h-20 border-b border-[#222] flex items-center px-8 bg-black/50 backdrop-blur-xl">
            <div class="flex items-center gap-4">
                <div class="w-3 h-3 bg-green-500 rounded-full shadow-[0_0_10px_#22c55e]"></div>
                <h2 class="font-bold tracking-tight text-lg text-white">Canal Principal</h2>
            </div>
        </header>
        
        <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-2 flex flex-col"></div>

        <div id="reply-container" class="hidden bg-[#121212] border-t p-3 flex justify-between items-center" style="border-color: var(--theme-color)">
            <div class="border-l-2 pl-4 text-xs">
                <p class="text-gray-500 uppercase font-bold text-[10px]">Respondendo a <span id="reply-user" class="text-white"></span></p>
                <p id="reply-text" class="text-gray-400 truncate w-64"></p>
            </div>
            <button onclick="cancelReply()" class="text-gray-500 hover:text-white mr-4">✕</button>
        </div>

        <footer class="p-6">
            <div class="max-w-5xl mx-auto flex items-center gap-4">
                <button onclick="enviarFoto()" class="text-2xl hover:scale-110 transition p-2">🖼️</button>
                <form id="form" class="flex-1 flex items-center insta-input-container px-6 focus-within:ring-2 focus-within:ring-blue-500/20">
                    <input id="input" autocomplete="off" placeholder="Escreva sua mensagem..." class="flex-1 bg-transparent py-4 outline-none text-sm text-white">
                    <button class="font-bold text-sm ml-4 hover:scale-105 transition" style="color: var(--theme-color)">Enviar</button>
                </form>
            </div>
        </footer>
    </main>

    <div id="settings-modal" class="hidden fixed inset-0 bg-black/95 z-[200] flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-[#121212] border border-[#333] p-8 rounded-[32px] w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-bold mb-8 text-white text-center">Configurações</h2>
            <div class="space-y-4">
                <input id="set-username" type="text" class="w-full bg-black border border-[#333] p-4 rounded-2xl text-white outline-none focus:border-blue-500 transition">
                <input id="set-avatar" type="text" class="w-full bg-black border border-[#333] p-4 rounded-2xl text-white outline-none focus:border-blue-500 transition">
                <div class="grid grid-cols-4 gap-4 justify-items-center">
                    <div onclick="changeTheme('#0095f6')" class="theme-dot" style="background:#0095f6"></div>
                    <div onclick="changeTheme('#ff3040')" class="theme-dot" style="background:#ff3040"></div>
                    <div onclick="changeTheme('#22c55e')" class="theme-dot" style="background:#22c55e"></div>
                    <div onclick="changeTheme('#a855f7')" class="theme-dot" style="background:#a855f7"></div>
                    <div onclick="changeTheme('#f472b6')" class="theme-dot" style="background:#f472b6"></div>
                    <div onclick="changeTheme('#fbbf24')" class="theme-dot" style="background:#fbbf24"></div>
                    <div onclick="changeTheme('#2dd4bf')" class="theme-dot" style="background:#2dd4bf"></div>
                    <div onclick="changeTheme('#6366f1')" class="theme-dot" style="background:#6366f1"></div>
                    <div onclick="changeTheme('#ff7a00')" class="theme-dot" style="background:#ff7a00"></div>
                    <div onclick="changeTheme('#ffffff')" class="theme-dot" style="background:#ffffff"></div>
                    <div onclick="changeTheme('#4ade80')" class="theme-dot" style="background:#4ade80"></div>
                    <div onclick="changeTheme('#ec4899')" class="theme-dot" style="background:#ec4899"></div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4 mt-10">
                <button onclick="closeSettings()" class="bg-[#222] text-white py-4 rounded-2xl hover:bg-[#333] transition">Voltar</button>
                <button onclick="saveSettings()" class="bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-500 transition">Salvar</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
