<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lux Chat Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        :root { --theme-color: #0095f6; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; color: #fff; }
        .glass-sidebar { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); border-right: 1px solid #222; }
        .insta-input-container { background: #1a1a1a; border: 1px solid #333; border-radius: 30px; }
        .bubble-me { background-color: var(--theme-color) !important; color: white !important; }
        .adm-name { background: linear-gradient(to right, #ffd700, #fff, #ffd700); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 2s linear infinite; font-weight: 800 !important; }
        .badge-criador { background: linear-gradient(45deg, #ffd700, #ff8c00); color: #000 !important; font-size: 9px; font-weight: 900; padding: 2px 6px; border-radius: 6px; margin-left: 8px; text-transform: uppercase; }
        @keyframes shine { to { background-position: 200% center; } }
        .theme-dot { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="h-screen flex overflow-hidden">
    <div id="login" class="fixed inset-0 bg-black z-[100] flex items-center justify-center p-6">
        <div class="w-full max-w-sm text-center">
            <h1 class="text-5xl font-extrabold tracking-tighter bg-gradient-to-r from-blue-500 to-purple-600 bg-clip-text text-transparent mb-10">Lux.</h1>
            <div class="space-y-4">
                <input id="username" type="text" placeholder="Nome de usuário" class="w-full bg-[#121212] border border-[#333] p-4 rounded-2xl outline-none text-white">
                <input id="avatar" type="text" placeholder="Link da foto" class="w-full bg-[#121212] border border-[#333] p-4 rounded-2xl outline-none text-white">
                <button onclick="entrar()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl">Entrar</button>
            </div>
        </div>
    </div>

    <aside class="w-20 lg:w-80 glass-sidebar hidden md:flex flex-col p-6">
        <h1 class="text-2xl font-bold mb-10">Mensagens</h1>
        <div class="flex-1 overflow-y-auto space-y-2" id="user-list"></div>
        <div class="mt-auto pt-6 border-t border-[#222]">
            <button onclick="openSettings()" class="w-full p-3 text-gray-400 text-left">⚙️ Configurações</button>
            <button onclick="logout()" class="w-full p-3 text-red-500 text-left font-bold">Sair</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col bg-black">
        <header class="h-20 border-b border-[#222] flex items-center px-8">
            <h2 class="font-bold text-lg">Canal Principal</h2>
        </header>
        <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-6 flex flex-col"></div>
        <footer class="p-6">
            <form id="form" class="max-w-5xl mx-auto flex items-center insta-input-container px-6">
                <input id="input" autocomplete="off" placeholder="Mensagem..." class="flex-1 bg-transparent py-4 outline-none text-white">
                <button class="font-bold" style="color: var(--theme-color)">Enviar</button>
            </form>
        </footer>
    </main>

    <div id="settings-modal" class="hidden fixed inset-0 bg-black/95 z-[200] flex items-center justify-center p-6">
        <div class="bg-[#121212] border border-[#333] p-8 rounded-[32px] w-full max-w-md">
            <h2 class="text-2xl font-bold mb-8 text-white">Configurações</h2>
            <div class="space-y-4">
                <input id="set-username" type="text" class="w-full bg-black border border-[#333] p-4 rounded-2xl text-white">
                <input id="set-avatar" type="text" class="w-full bg-black border border-[#333] p-4 rounded-2xl text-white">
                <div class="flex gap-4 justify-center">
                    <div onclick="changeTheme('#0095f6')" class="theme-dot" style="background:#0095f6"></div>
                    <div onclick="changeTheme('#ff3040')" class="theme-dot" style="background:#ff3040"></div>
                    <div onclick="changeTheme('#22c55e')" class="theme-dot" style="background:#22c55e"></div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4 mt-8">
                <button onclick="closeSettings()" class="bg-[#222] text-white py-4 rounded-2xl">Voltar</button>
                <button onclick="saveSettings()" class="bg-blue-600 text-white py-4 rounded-2xl font-bold">Salvar</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
