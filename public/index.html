<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Chat Futurista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Rajdhani', sans-serif; background: #050505; }
        .neon-border { border: 1px solid rgba(0, 255, 157, 0.3); box-shadow: 0 0 15px rgba(0, 255, 157, 0.1); }
        .glass { background: rgba(20, 20, 25, 0.8); backdrop-filter: blur(10px); }
        .neon-text { text-shadow: 0 0 10px #00ff9d; color: #00ff9d; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #00ff9d; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex text-gray-100 overflow-hidden">

    <div id="login" class="fixed inset-0 bg-[#050505] z-[100] flex flex-col items-center justify-center p-6">
        <h1 class="text-5xl font-bold neon-text mb-2 font-['Orbitron']">GEMINI OS</h1>
        <p class="text-xs tracking-[0.5em] text-emerald-500/50 mb-12">ENCRYPTED CONNECTION</p>
        <div class="glass neon-border p-8 rounded-2xl w-full max-w-sm">
            <input id="username" type="text" placeholder="ACCESS_ID" class="w-full bg-black/50 border border-emerald-500/30 p-4 rounded-lg mb-4 outline-none focus:border-emerald-400 transition">
            <input id="avatar" type="text" placeholder="AVATAR_URL" class="w-full bg-black/50 border border-emerald-500/30 p-4 rounded-lg mb-8 outline-none focus:border-emerald-400 transition">
            <button onclick="entrar()" class="w-full bg-emerald-500 text-black font-bold py-4 rounded-lg hover:bg-emerald-400 transition shadow-[0_0_20px_rgba(0,255,157,0.4)]">INITIALIZE</button>
        </div>
    </div>

    <aside class="w-20 md:w-64 glass border-r border-emerald-500/20 flex flex-col items-center md:items-start p-4 hidden md:flex">
        <h2 class="neon-text font-bold mb-6 hidden md:block">ONLINE_USERS</h2>
        <div id="user-list" class="flex flex-col gap-4 w-full"></div>
    </aside>

    <main class="flex-1 flex flex-col relative">
        <header class="p-6 glass border-b border-emerald-500/20 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_10px_#00ff9d]"></div>
                <span class="font-bold tracking-widest uppercase">Main_Channel</span>
            </div>
            <div id="typing-indicator" class="text-xs text-emerald-400/60 italic"></div>
        </header>

        <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-6 flex flex-col"></div>

        <form id="form" class="p-6 glass border-t border-emerald-500/20 flex gap-4">
            <input id="input" autocomplete="off" placeholder="TYPE_MESSAGE..." class="flex-1 bg-black/40 border border-emerald-500/20 p-4 rounded-xl outline-none focus:border-emerald-500/50 transition">
            <button class="bg-emerald-500/10 border border-emerald-500 text-emerald-500 px-8 rounded-xl font-bold hover:bg-emerald-500 hover:text-black transition">SEND</button>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
