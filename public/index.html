<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lux Chat Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        :root { 
            --theme-color: #0095f6; 
            --theme-rgb: 0, 149, 246;
        }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #050505; 
            color: #fff; margin: 0; padding: 0; height: 100vh; display: flex; overflow: hidden;
            position: relative;
        }

        .glow-bg {
            position: absolute; width: 600px; height: 600px;
            border-radius: 50%; filter: blur(100px); opacity: 0.5;
            z-index: 0; pointer-events: none;
            animation: moveGlow 15s infinite alternate ease-in-out !important;
        }
        .glow-1 { background: var(--theme-color); top: -15%; left: -10%; }
        .glow-2 { background: #7c3aed; bottom: -15%; right: -10%; animation-delay: -5s; }
        
        @keyframes moveGlow {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(150px, 50px) scale(1.1); }
            100% { transform: translate(50px, 150px) scale(1.2); }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            position: relative; z-index: 10;
        }

        .profile-section {
            display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 12px;
        }

        .avatar-wrapper { position: relative; width: 85px; height: 85px; }

        .avatar-main {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 3px solid var(--theme-color); box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .lv-badge-circle {
            position: absolute; bottom: 0; right: 0; background: var(--theme-color);
            color: white; font-size: 10px; font-weight: 900; width: 24px; height: 24px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 3px solid #050505;
        }

        /* --- BALÕES (GLASSMORPHISM) --- */
        .bubble-me { 
            background: rgba(var(--theme-rgb), 0.15) !important; 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        .bg-white\/5 {
            background: rgba(255, 255, 255, 0.04) !important;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
        }

        /* --- SELOS --- */
        .badge-authority { font-size: 9px; font-weight: 900; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; margin-left: 4px; display: inline-flex; align-items: center; }
        .badge-creator { background: linear-gradient(135deg, #FFD700 0%, #B8860B 50%, #FFD700 100%); color: #000 !important; }
        .badge-adm { background: #000; color: #FF0000 !important; border: 1px solid #FF0000; }

        .facepile-container { display: flex; align-items: center; padding: 10px; margin-bottom: 5px; justify-content: center; }
        .face-item { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #000; margin-right: -12px; transition: transform 0.2s; cursor: pointer; }
        .face-item:hover { transform: scale(1.2); z-index: 50; }

        .xp-bar-bg { width: 100%; height: 5px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; overflow: hidden; margin-top: 5px; }
        .xp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--theme-color), #fff); transition: width 0.5s ease; }

        .insta-input-container { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; }
        #messages::-webkit-scrollbar { width: 4px; }
        #messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .theme-dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div class="glow-bg glow-1"></div>
    <div class="glow-bg glow-2"></div>

    <div id="login" class="fixed inset-0 bg-black z-[100] flex items-center justify-center p-6">
        <div class="w-full max-sm text-center">
            <h1 class="text-5xl font-extrabold tracking-tighter bg-gradient-to-r from-blue-500 to-purple-600 bg-clip-text text-transparent mb-10">Lux.</h1>
            <input id="username" type="text" placeholder="Nome de usuário" class="w-full bg-[#121212] border border-[#333] p-4 rounded-2xl mb-4 outline-none text-white text-center">
            <input id="avatar" type="text" placeholder="URL da foto (opcional)" class="w-full bg-[#121212] border border-[#333] p-4 rounded-2xl mb-4 outline-none text-white text-center">
            <button onclick="entrar()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-500 transition">Entrar</button>
        </div>
    </div>

    <aside class="w-20 lg:w-72 glass-panel hidden md:flex flex-col p-4 flex-shrink-0">
        <div class="profile-section">
            <div class="avatar-wrapper">
                <img id="my-avatar" src="" class="avatar-main">
                <div id="user-level" class="lv-badge-circle">1</div>
            </div>
            <h3 id="my-name" class="font-bold text-sm tracking-tight text-white"></h3>
            <div class="w-full px-4">
                <div class="flex justify-between text-[9px] font-bold text-gray-500 mb-1">
                    <span>XP STATUS</span>
                    <span><span id="user-xp">0</span>/100</span>
                </div>
                <div class="xp-bar-bg"><div id="xp-fill" class="xp-bar-fill"></div></div>
            </div>
        </div>
        <div id="facepile" class="facepile-container"></div>
        <div id="user-list" class="flex-1 overflow-y-auto space-y-2 mt-4"></div>
        <div class="pt-4 border-t border-white/5 space-y-2">
            <button onclick="openSettings()" class="w-full text-left text-gray-400 text-sm p-2 hover:text-white transition">⚙️ Configurações</button>
            <button onclick="logout()" class="w-full text-left text-red-500 text-sm p-2 font-bold hover:bg-red-500/10 rounded-lg transition">Sair</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col bg-transparent overflow-hidden">
        <header class="h-16 border-b border-white/5 flex items-center px-6 backdrop-blur-md flex-shrink-0">
            <h2 class="font-bold text-white flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Canal Principal
            </h2>
        </header>
        <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-1"></div>
        <div id="reply-container" class="hidden bg-black/60 backdrop-blur-xl border-t p-3 flex justify-between items-center" style="border-color: var(--theme-color)">
            <div class="border-l-2 pl-4 text-xs">
                <p id="reply-user" class="font-bold text-white"></p>
                <p id="reply-text" class="text-gray-400 truncate w-48"></p>
            </div>
            <button onclick="cancelReply()" class="text-gray-500">✕</button>
        </div>
        <footer class="p-4 bg-transparent flex-shrink-0">
            <div class="max-w-5xl mx-auto flex items-center gap-3">
                <button onclick="enviarFoto()" class="text-xl hover:scale-110 transition">🖼️</button>
                <form id="form" class="flex-1 flex items-center insta-input-container px-4">
                    <input id="input" autocomplete="off" placeholder="Mensagem..." class="flex-1 bg-transparent py-3 outline-none text-white text-sm">
                    <button class="font-bold text-sm" style="color: var(--theme-color)">Enviar</button>
                </form>
            </div>
        </footer>
    </main>

    <div id="settings-modal" class="hidden fixed inset-0 bg-black/95 z-[200] flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-[#121212] border border-white/10 p-8 rounded-[32px] w-full max-w-md">
            <h2 class="text-2xl font-bold mb-8 text-white text-center">Editar Perfil</h2>
            <div class="space-y-4">
                <input id="set-username" type="text" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-white outline-none">
                <input id="set-avatar" type="text" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-white outline-none">
                <div class="grid grid-cols-4 gap-3 p-4 bg-black/40 rounded-2xl">
                    <div onclick="changeTheme('#0095f6')" class="theme-dot" style="background:#0095f6"></div>
                    <div onclick="changeTheme('#ff3040')" class="theme-dot" style="background:#ff3040"></div>
                    <div onclick="changeTheme('#42e97f')" class="theme-dot" style="background:#42e97f"></div>
                    <div onclick="changeTheme('#00f9f9')" class="theme-dot" style="background:#00f9f9"></div>
                    <div onclick="changeTheme('#9000ff')" class="theme-dot" style="background:#9000ff"></div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4 mt-8">
                <button onclick="closeSettings()" class="bg-[#222] text-white py-4 rounded-2xl">Voltar</button>
                <button onclick="saveSettings()" class="bg-blue-600 text-white py-4 rounded-2xl font-bold">Salvar</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
