<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Chat v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
        .reply-preview { border-left: 4px solid #6366f1; background: rgba(99, 102, 241, 0.1); }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <div id="login" class="fixed inset-0 bg-[#0f172a] z-[100] flex items-center justify-center p-6">
        <div class="glass-card p-10 rounded-3xl w-full max-w-md shadow-2xl text-center border border-indigo-500/20">
            <h1 class="text-3xl font-bold mb-8">Acessar Chat</h1>
            <input id="username" type="text" placeholder="Seu nome" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl mb-4 outline-none focus:border-indigo-500 transition text-white">
            <input id="avatar" type="text" placeholder="URL da foto (opcional)" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl mb-8 outline-none focus:border-indigo-500 transition text-white">
            <button onclick="entrar()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-4 rounded-xl transition shadow-xl shadow-indigo-500/20">Acessar</button>
        </div>
    </div>

    <aside class="w-24 md:w-72 glass-card m-4 rounded-3xl flex flex-col p-6 hidden md:flex border border-white/5">
        <h2 class="text-lg font-bold mb-6">Online <span id="user-count" class="text-xs bg-indigo-600 px-2 py-0.5 rounded-full">0</span></h2>
        <div id="user-list" class="flex flex-col gap-4 overflow-y-auto"></div>
        <button onclick="logout()" class="mt-auto text-xs text-slate-500 hover:text-red-400 transition text-left px-2">Sair da conta</button>
    </aside>

    <main class="flex-1 flex flex-col m-4 ml-0 md:ml-0 relative">
        <header class="glass-card p-5 rounded-t-3xl border-b-0 flex justify-between items-center border border-white/5">
            <div>
                <h3 class="font-bold text-slate-200"># Canal Principal</h3>
                <div id="typing-indicator" class="text-xs text-indigo-400 h-4 italic"></div>
            </div>
        </header>

        <div id="messages" class="flex-1 glass-card border-y-0 p-6 space-y-6 overflow-y-auto border-x border-white/5"></div>

        <div id="reply-container" class="hidden glass-card mx-0 p-3 border-x border-t border-white/5 flex justify-between items-center reply-preview">
            <div class="text-sm">
                <span class="text-indigo-400 font-bold block text-xs">Respondendo a: <span id="reply-name"></span></span>
                <span id="reply-text" class="text-slate-400 truncate block max-w-md"></span>
            </div>
            <button onclick="cancelReply()" class="text-slate-500 hover:text-white">✕</button>
        </div>

        <form id="form" class="glass-card p-4 rounded-b-3xl flex gap-3 items-center border border-white/5">
            <button type="button" onclick="enviarFoto()" class="text-slate-400 hover:text-indigo-400 transition p-2"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg></button>
            <input id="input" autocomplete="off" placeholder="Digite..." class="flex-1 bg-slate-900/50 border border-slate-700 p-4 rounded-2xl outline-none focus:border-indigo-500 transition text-sm text-white">
            <button class="bg-indigo-600 p-4 rounded-2xl hover:bg-indigo-500 text-white shadow-lg shadow-indigo-500/20"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg></button>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
