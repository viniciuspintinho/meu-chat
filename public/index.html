<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lux Chat Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        :root { --theme-color: #0095f6; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; color: #fff; margin: 0; padding: 0; }
        
        /* Sidebar Estilo Antigo */
        .glass-sidebar { background: #0a0a0a; border-right: 1px solid #222; }
        
        /* Input Estilo Antigo (Evita sumir no teclado) */
        .insta-input-container { background: #1a1a1a; border: 1px solid #333; border-radius: 30px; }
        
        /* Bolhas de Mensagem */
        .bubble-me { background-color: var(--theme-color) !important; color: white !important; }
        .bubble-glow { box-shadow: 0 4px 15px -5px var(--theme-color); }
        
        /* Admin e Badges */
        .adm-name { background: linear-gradient(to right, #ffd700, #fff, #ffd700); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 2s linear infinite; font-weight: 800 !important; }
        .badge-criador { background: linear-gradient(45deg, #ffd700, #ff8c00); color: #000 !important; font-size: 9px; font-weight: 900; padding: 2px 6px; border-radius: 6px; margin-left: 8px; text-transform: uppercase; }
        @keyframes shine { to { background-position: 200% center; } }
        
        /* Animação Suave */
        .message-animation { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Utilitários */
        .mention-me { background-color: rgba(255, 215, 0, 0.1) !important; border: 1px solid #ffd700 !important; }
        .mention-text { color: var(--theme-color); font-weight: bold; }
        .letreiro-msg { background: #fff; color: #000; font-weight: 900; padding: 10px; border-radius: 10px; text-transform: uppercase; text-align: center; width: 100%; }
        .system-msg { font-size: 11px; color: #555; text-align: center; margin: 10px 0; font-weight: 600; text-transform: uppercase; }
        
        .theme-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.1); }
        .theme-dot.active { border-color: white; }
    </style>
</head>
<body class="h-screen flex">
    <div id="login" class="fixed inset-0 bg-black z-[100] flex items-center justify-center p-6">
        <div class="w-full max-w-sm text-center">
            <h1 class="text-5xl font-extrabold tracking-tighter bg-gradient-to-r from-blue-500 to-purple-600 bg-clip-text text-transparent mb-10">Lux.</h1>
            <input id="username" type="text" placeholder="Nome de usuário" class="w-full bg-[#121212] border border-[#333] p-4 rounded-2xl mb-4 outline-none text-white">
            <input id="avatar" type="text" placeholder="Link da foto" class="w-full bg-[#121212] border border-[#333] p-4 rounded-2xl mb-4 outline-none text-white">
            <button onclick="entrar()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl">Entrar</button>
        </div>
    </div>

    <aside class="w-20 lg:w-72 glass-sidebar hidden md:flex flex-col p-4">
        <h2 class="text-xl font-bold mb-6 px-2">Mensagens</h2>
        <div id="user-list" class="flex-1 overflow-y-auto space-y-2"></div>
        <div class="pt-4 border-t border-[#222] space-y-2">
            <button onclick="openSettings()" class="w-full text-left text-gray-400 text-sm p-2 hover:text-white transition">⚙️ Configurações</button>
            <button onclick="logout()" class="w-full text-left text-red-500 text-sm p-2 font-bold">Sair</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col bg-black relative">
        <header class="h-16 border-b border-[#222] flex items-center px-6">
            <h2 class="font-bold text-white">Canal Principal</h2>
        </header>

        <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-1"></div>

        <div id="reply-container" class="hidden bg-[#121212] border-t p-3 flex justify-between items-center" style="border-color: var(--theme-color)">
            <div class="border-l-2 pl-4 text-xs">
                <p class="text-gray-500 uppercase font-bold text-[10px]">Respondendo a <span id="reply-user" class="text-white"></span></p>
                <p id="reply-text" class="text-gray-400 truncate w-48"></p>
            </div>
            <button onclick="cancelReply()" class="text-gray-500">✕</button>
        </div>

        <footer class="p-4 bg-black">
            <div class="flex items-center gap-3">
                <button onclick="enviarFoto()" class="text-xl">🖼️</button>
                <form id="form" class="flex-1 flex items-center insta-input-container px-4">
                    <input id="input" autocomplete="off" placeholder="Mensagem..." class="flex-1 bg-transparent py-3 outline-none text-white text-sm">
                    <button class="font-bold text-sm" style="color: var(--theme-color)">Enviar</button>
                </form>
            </div>
        </footer>
    </main>

    <div id="settings-modal" class="hidden fixed inset-0 bg-black/90 z-[200] flex items-center justify-center p-6">
        <div class="bg-[#121212] border border-[#333] p-6 rounded-3xl w-full max-w-sm">
            <h2 class="text-xl font-bold mb-6 text-center">Configurações</h2>
            <div class="space-y-4">
                <input id="set-username" type="text" class="w-full bg-black border border-[#333] p-3 rounded-xl text-white outline-none">
                <input id="set-avatar" type="text" class="w-full bg-black border border-[#333] p-3 rounded-xl text-white outline-none">
                <div class="grid grid-cols-4 gap-3 justify-items-center" id="theme-grid">
                    <div onclick="changeTheme('#0095f6')" class="theme-dot" style="background:#0095f6"></div>
                    <div onclick="changeTheme('#ff3040')" class="theme-dot" style="background:#ff3040"></div>
                    <div onclick="changeTheme('#22c55e')" class="theme-dot" style="background:#22c55e"></div>
                    <div onclick="changeTheme('#a855f7')" class="theme-dot" style="background:#a855f7"></div>
                </div>
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="closeSettings()" class="flex-1 bg-[#222] py-3 rounded-xl">Voltar</button>
                <button onclick="saveSettings()" class="flex-1 bg-blue-600 py-3 rounded-xl font-bold">Salvar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
