<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>chat</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');

:root{
--theme-color:#0095f6;
--theme-rgb:0,149,246;
--creator-gold:#ffec82;
--creator-gold-dark:#daa520;
--adm-red:#ff3040;
}

body{
font-family:'Plus Jakarta Sans',sans-serif;
background:#050505;
color:#fff;
margin:0;
padding:0;
height:100vh;
display:flex;
overflow:hidden;
position:relative;
}

.system-msg{
width:100%;
text-align:center;
font-size:11px;
color:rgba(255,255,255,.4);
margin:10px 0;
font-style:italic;
}

.admin-glow{
border:1px solid rgba(255,236,130,.3)!important;
box-shadow:0 0 15px rgba(255,236,130,.1),0 15px 50px -10px rgba(0,0,0,.6)!important;
}

@keyframes slideIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

.message-animate{
animation:slideIn .3s ease-out forwards;
}

.msg-header-autoridade{
display:flex;
align-items:center;
gap:6px;
margin-bottom:5px;
}

.badge-authority{
font-size:8px;
font-weight:800;
padding:2px 7px;
border-radius:4px;
text-transform:uppercase;
display:inline-flex;
align-items:center;
letter-spacing:.5px;
}

.admin-icon{
color:var(--adm-red);
font-size:12px;
filter:drop-shadow(0 0 4px var(--adm-red));
}

.badge-adm{
background:#000;
color:var(--adm-red)!important;
border:1px solid var(--adm-red);
box-shadow:0 0 8px rgba(255,48,64,.4);
}

.admin-name-highlight{
color:var(--creator-gold)!important;
text-shadow:0 0 10px rgba(255,236,130,.3);
font-weight:800;
}

.bubble-me{
background:rgba(var(--theme-rgb),.2)!important;
backdrop-filter:blur(13px);
border:1px solid rgba(255,255,255,.1)!important;
box-shadow:0 15px 50px -10px rgba(0,0,0,.6);
}

.bg-white\/5{
background:rgba(255,255,255,.05)!important;
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.05)!important;
box-shadow:0 15px 50px -10px rgba(0,0,0,.6);
}

.glow-bg{
position:absolute;
width:600px;
height:600px;
border-radius:50%;
filter:blur(100px);
opacity:.4;
z-index:0;
pointer-events:none;
}

.glow-1{
background:var(--theme-color);
top:-15%;
left:-10%;
}

.glow-2{
background:#7c3aed;
bottom:-15%;
right:-10%;
}

.glass-panel{
background:rgba(255,255,255,.03);
backdrop-filter:blur(20px);
border-right:1px solid rgba(255,255,255,.05);
position:relative;
z-index:10;
}

.avatar-main{
width:85px;
height:85px;
border-radius:50%;
object-fit:cover;
border:3px solid var(--theme-color);
}

.lv-badge-circle{
position:absolute;
bottom:0;
right:0;
background:var(--theme-color);
color:#fff;
font-size:10px;
font-weight:900;
width:24px;
height:24px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
border:3px solid #050505;
}

.xp-bar-bg{
width:100%;
height:5px;
background:rgba(255,255,255,.1);
border-radius:10px;
overflow:hidden;
position:relative;
}

.xp-bar-fill{
height:100%;
background:linear-gradient(90deg,var(--theme-color),#fff);
transition:width .5s ease;
}

.insta-input-container{
background:rgba(255,255,255,.07);
border:1px solid rgba(255,255,255,.1);
border-radius:30px;
transition:.3s;
box-shadow:0 4px 15px rgba(0,0,0,.2);
}

.insta-input-container:focus-within{
background:rgba(255,255,255,.1);
border-color:var(--theme-color);
transform:translateY(-2px);
}

#messages::-webkit-scrollbar{width:4px;}
#messages::-webkit-scrollbar-thumb{
background:rgba(255,255,255,.1);
border-radius:10px;
}

.theme-dot{
width:28px;
height:28px;
border-radius:50%;
cursor:pointer;
border:2px solid rgba(255,255,255,.1);
}

#typing-indicator{
transition:opacity .3s;
min-height:20px;
font-size:10px;
color:#666;
padding-left:20px;
}

.xp-popup{
position:absolute;
color:var(--theme-color);
font-weight:bold;
font-size:12px;
right:0;
top:-20px;
animation:floatUp 1s ease-out forwards;
pointer-events:none;
}

@keyframes floatUp{
0%{opacity:1;transform:translateY(0);}
100%{opacity:0;transform:translateY(-20px);}
}
</style>
</head>

<body>

<div class="glow-bg glow-1"></div>
<div class="glow-bg glow-2"></div>

<div id="login" class="fixed inset-0 bg-black z-[100] flex items-center justify-center p-6">
<div class="w-full max-w-sm text-center">
<h1 class="text-5xl font-extrabold tracking-tighter bg-gradient-to-r from-blue-500 to-purple-600 bg-clip-text text-transparent mb-10">Lux.</h1>

<input id="username" type="text" placeholder="Nome de usuário" class="w-full bg-[#121212] border border-[#333] p-4 rounded-2xl mb-4 outline-none text-white text-center">

<input id="avatar" type="text" placeholder="URL da foto (opcional)" class="w-full bg-[#121212] border border-[#333] p-4 rounded-2xl mb-4 outline-none text-white text-center">

<button onclick="entrar()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-500 transition">
Entrar
</button>
</div>
</div>

<aside class="w-20 lg:w-72 glass-panel hidden md:flex flex-col p-4 flex-shrink-0">

<div class="profile-section flex flex-col items-center gap-4 py-4">
<div class="avatar-wrapper relative">
<img id="my-avatar" src="" class="avatar-main">
<div id="user-level" class="lv-badge-circle">1</div>
</div>

<h3 id="my-name" class="font-bold text-sm tracking-tight text-white"></h3>

<div class="w-full px-4">
<div class="flex justify-between text-[9px] font-bold text-gray-500 mb-1">
<span>XP STATUS</span>
<span><span id="user-xp">0</span>/100</span>
</div>

<div class="xp-bar-bg">
<div id="xp-fill" class="xp-bar-fill"></div>
<div id="xp-popup-container"></div>
</div>
</div>
</div>

<div id="user-list" class="flex-1 overflow-y-auto space-y-2 mt-4"></div>

<div class="pt-4 border-t border-white/5 space-y-2">
<button onclick="toggleGarticView()" class="w-full text-left text-blue-400 text-sm p-2 hover:bg-blue-500/10 rounded-lg transition font-bold">
🎨 Gartic
</button>

<button onclick="openSettings()" class="w-full text-left text-gray-400 text-sm p-2 hover:text-white transition">
⚙️ Configurações
</button>

<button onclick="logout()" class="w-full text-left text-red-500 text-sm p-2 font-bold hover:bg-red-500/10 rounded-lg transition">
Sair
</button>
</div>

</aside>

<main class="flex-1 flex flex-col bg-transparent overflow-hidden">

<header class="h-16 border-b border-white/5 flex items-center px-6 backdrop-blur-md flex-shrink-0">
<h2 class="font-bold text-white flex items-center gap-2">
<span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
Canal Principal
</h2>
</header>

<div id="messages" class="flex-1 overflow-y-auto p-4 space-y-1"></div>

<div id="typing-indicator"></div>

<div id="reply-container" class="hidden bg-black/60 backdrop-blur-xl border-t p-3 flex justify-between items-center" style="border-color:var(--theme-color)">
<div class="border-l-2 pl-4 text-xs">
<p id="reply-user" class="font-bold text-white"></p>
<p id="reply-text" class="text-gray-400 truncate w-48"></p>
</div>
<button onclick="cancelReply()" class="text-gray-500">✕</button>
</div>

<div id="gartic-box" class="hidden px-4 pb-3">
<div class="max-w-5xl mx-auto bg-black/30 border border-white/10 rounded-3xl p-4 backdrop-blur-xl">

<div class="flex items-center justify-between mb-3 flex-wrap gap-2">
<div>
<h3 class="font-bold text-white">🎨 Gartic Lux</h3>
<p id="garticInfo" class="text-xs text-gray-400">Aguardando partida...</p>
</div>

<div class="flex items-center gap-3 bg-black/40 p-2 rounded-2xl border border-white/5">
    <input type="color" id="colorPicker" value="#000000" class="w-8 h-8 border-none bg-transparent cursor-pointer rounded">
    <select id="penSize" class="bg-transparent text-white text-xs outline-none cursor-pointer">
        <option value="2">Fino</option>
        <option value="5" selected>Médio</option>
        <option value="10">Grosso</option>
        <option value="20">Gigante</option>
    </select>
    <button id="clearBtn" class="px-4 py-2 rounded-xl bg-red-500/20 text-red-400 text-sm font-bold hover:bg-red-500/30 transition">
        Limpar
    </button>
</div>
</div>

<canvas id="garticCanvas" class="w-full rounded-2xl bg-white cursor-crosshair" height="350"></canvas>

<div class="mt-3 text-xs text-gray-300">
<div id="ranking"></div>
</div>

</div>
</div>

<footer class="p-4 bg-transparent flex-shrink-0">
<div class="max-w-5xl mx-auto flex items-center gap-3">

<button onclick="enviarFoto()" class="text-xl hover:scale-110 transition">🖼️</button>

<form id="form" class="flex-1 flex items-center insta-input-container px-4">
<input id="input" autocomplete="off" placeholder="Mensagem..." class="flex-1 bg-transparent py-3 outline-none text-white text-sm">

<button class="font-bold text-sm" style="color:var(--theme-color)">
Enviar
</button>
</form>

</div>
</footer>

</main>

<div id="settings-modal" class="hidden fixed inset-0 bg-black/95 z-[200] flex items-center justify-center p-6 backdrop-blur-sm">

<div class="bg-[#121212] border border-white/10 p-8 rounded-[32px] w-full max-w-md">

<h2 class="text-2xl font-bold mb-8 text-white text-center">Editar Perfil</h2>

<div class="space-y-4">

<input id="set-username" type="text" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-white outline-none">

<input id="set-avatar" type="text" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-white outline-none">

<div class="grid grid-cols-4 gap-3 p-4 bg-black/40 rounded-2xl">
<div onclick="changeTheme('#0095f6')" class="theme-dot" style="background:#0095f6"></div>
<div onclick="changeTheme('#ff3040')" class="theme-dot" style="background:#ff3040"></div>
<div onclick="changeTheme('#42e97f')" class="theme-dot" style="background:#42e97f"></div>
<div onclick="changeTheme('#00f9f9')" class="theme-dot" style="background:#00f9f9"></div>
<div onclick="changeTheme('#9000ff')" class="theme-dot" style="background:#9000ff"></div>
</div>

</div>

<div class="grid grid-cols-2 gap-4 mt-8">
<button onclick="closeSettings()" class="bg-[#222] text-white py-4 rounded-2xl">
Voltar
</button>

<button onclick="saveSettings()" class="bg-blue-600 text-white py-4 rounded-2xl font-bold">
Salvar
</button>
</div>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
