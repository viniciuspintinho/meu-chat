<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Chat Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
        .reply-preview { border-left: 4px solid #6366f1; background: rgba(99, 102, 241, 0.1); }
        #theme-style-container { --theme-color: #6366f1; }
        .bg-theme { background-color: var(--theme-color) !important; }
        .text-theme { color: var(--theme-color) !important; }
        .border-theme { border-color: var(--theme-color) !important; }
    </style>
</head>
<body class="h-screen flex overflow-hidden" id="theme-style-container">

    <div id="login" class="fixed inset-0 bg-[#0f172a] z-[100] flex items-center justify-center p-6">
        <div class="glass-card p-10 rounded-3xl w-full max-w-md shadow-2xl text-center border border-white/10">
            <h1 class="text-3xl font-bold mb-8">Acessar Chat</h1>
            <input id="username" type="text" placeholder="Seu nome" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl mb-4 outline-none focus:border-indigo-500 transition text-white">
            <input id="avatar" type="text" placeholder="URL da foto (opcional)" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl mb-8 outline-none focus:border-indigo-500 transition text-white">
            <button onclick="entrar()" class="w-full bg-theme text-white font-semibold py-4 rounded-xl transition shadow-xl shadow-indigo-500/20">Acessar</button>
        </div>
    </div>

    <aside class="w-24 md:w-72 glass-card m-4 rounded-3xl flex flex-col p-6 hidden md:flex border border-white/5">
        <h2 class="text-lg font-bold mb-6">Online <span id="user-count" class="text-xs bg-theme px-2 py-0.5 rounded-full text-white">0</span></h2>
        <div id="user-list" class="flex flex-col gap-4 overflow-y-auto"></div>
        
        <div class="mt-auto flex flex-col gap-3">
            <button onclick="openSettings()" class="flex items-center gap-2 text-xs text-slate-400 hover:text-white transition px-2">
                <span>⚙️ Configurações</span>
            </button>
            <button onclick="logout()" class="text-xs text-slate-500 hover:text-red-400 transition text-left px-2 underline">Sair da conta</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col m-4 ml-0 md:ml-0 relative">
        <header class="glass-card p-5 rounded-t-3xl border-b-0 flex justify-between items-center border border-white/5">
            <div>
                <h3 class="font-bold text-slate-200"># Canal Principal</h3>
                <div id="typing-indicator" class="text-xs text-theme h-4 italic"></div>
            </div>
        </header>

        <div id="messages" class="flex-1 glass-card border-y-0 p-6 space-y-6 overflow-y-auto border-x border-white/5"></div>

        <div id="reply-container" class="hidden glass-card mx-0 p-3 border-x border-t border-white/5 flex justify-between items-center reply-preview border-theme">
            <div class="text-sm">
                <span class="text-theme font-bold block text-xs">Respondendo a: <span id="reply-name"></span></span>
                <span id="reply-text" class="text-slate-400 truncate block max-w-md"></span>
            </div>
            <button onclick="cancelReply()" class="text-slate-500 hover:text-white">✕</button>
        </div>

        <form id="form" class="glass-card p-4 rounded-b-3xl flex gap-3 items-center border border-white/5">
            <button type="button" onclick="enviarFoto()" class="text-slate-400 hover:text-theme transition p-2">📷</button>
            <input id="input" autocomplete="off" placeholder="Digite uma mensagem..." class="flex-1 bg-slate-900/50 border border-slate-700 p-4 rounded-2xl outline-none focus:border-theme transition text-sm text-white">
            <button class="bg-theme p-4 rounded-2xl hover:opacity-90 text-white transition">➤</button>
        </form>
    </main>

    <div id="settings-modal" class="hidden fixed inset-0 bg-black/80 z-[200] flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="glass-card p-8 rounded-3xl w-full max-w-sm border border-white/10 shadow-2xl">
            <h2 class="text-xl font-bold mb-6">Editar Perfil & Tema</h2>
            <label class="block text-xs text-slate-400 mb-1">Seu Nome</label>
            <input id="set-username" type="text" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl mb-4 text-white">
            <label class="block text-xs text-slate-400 mb-1">Link da Foto</label>
            <input id="set-avatar" type="text" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl mb-6 text-white">
            
            <label class="block text-xs text-slate-400 mb-2">Cor do Tema</label>
            <div class="flex gap-3 mb-8">
                <button onclick="changeTheme('indigo', '#6366f1')" class="w-8 h-8 rounded-full bg-[#6366f1] border-2 border-transparent focus:border-white"></button>
                <button onclick="changeTheme('emerald', '#10b981')" class="w-8 h-8 rounded-full bg-[#10b981] border-2 border-transparent focus:border-white"></button>
                <button onclick="changeTheme('pink', '#ec4899')" class="w-8 h-8 rounded-full bg-[#ec4899] border-2 border-transparent focus:border-white"></button>
                <button onclick="changeTheme('amber', '#f59e0b')" class="w-8 h-8 rounded-full bg-[#f59e0b] border-2 border-transparent focus:border-white"></button>
            </div>
            <div class="flex gap-2">
                <button onclick="closeSettings()" class="flex-1 bg-slate-700 py-3 rounded-xl font-semibold">Voltar</button>
                <button onclick="saveSettings()" class="flex-1 bg-theme py-3 rounded-xl font-semibold text-white">Salvar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
